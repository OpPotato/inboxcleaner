<div class="modal-overlay" hx-on:click="if (event.target === this) this.remove()">
  <div class="modal">
    <h3>Confirm {{ action }}</h3>
    <p><strong>{{ preview.message_count }} messages</strong>
       ({{ preview.total_size | filesizeformat }})</p>
    {% if preview.samples %}
    <p>Sample subjects:</p>
    <ul>
      {% for s in preview.samples %}<li>{{ s.subject or "(no subject)" }}</li>{% endfor %}
    </ul>
    {% endif %}
    <form hx-post="/actions/execute" hx-target="#modal">
      <input type="hidden" name="target_kind" value="{{ target_kind }}">
      <input type="hidden" name="target_id" value="{{ target_id }}">
      <input type="hidden" name="action" value="{{ action }}">
      {% if action == "label" %}
        <label>Label name <input name="label_name" required></label>
      {% endif %}
      <div class="action-buttons">
        <button type="submit">Confirm</button>
        <button type="button" onclick="document.querySelector('.modal-overlay').remove()">Cancel</button>
      </div>
    </form>
  </div>
</div>
