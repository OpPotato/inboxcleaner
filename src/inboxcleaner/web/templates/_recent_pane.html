<div id="recent-pane">
  {% if selected_sender %}
  <div class="filter-banner">
    <span>Filtered to <code>{{ selected_sender.email }}</code></span>
    <button hx-get="/recent?group_id={{ group_id }}" hx-target="#recent-pane">Show all ✕</button>
  </div>
  {% endif %}
  <h2>Recent messages</h2>
  {% if recent %}
  <ul class="recent-list">
    {% for r in recent %}
      <li>
        <time>{{ r["internal_date"] | human_date }}</time>
        <span class="subject">{{ r["subject"] or "(no subject)" }}</span>
      </li>
    {% endfor %}
  </ul>
  {% else %}
  <p class="empty">No messages.</p>
  {% endif %}
</div>
