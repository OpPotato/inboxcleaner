<table class="groups-table">
  <thead>
    <tr>
      <th class="col-id">ID</th>
      <th class="col-name">Name</th>
      <th class="col-num sortable"><a href="?sort=count&category={{ category }}"
            class="sort-link"
            hx-get="/groups?sort=count&category={{ category }}"
            hx-target="#groups-table">Messages{% if sort == "count" %} ↓{% endif %}</a></th>
      <th class="col-num sortable"><a href="?sort=size&category={{ category }}"
            class="sort-link"
            hx-get="/groups?sort=size&category={{ category }}"
            hx-target="#groups-table">Size{% if sort == "size" %} ↓{% endif %}</a></th>
      <th class="col-date sortable"><a href="?sort=date&category={{ category }}"
            class="sort-link"
            hx-get="/groups?sort=date&category={{ category }}"
            hx-target="#groups-table">Latest{% if sort == "date" %} ↓{% endif %}</a></th>
    </tr>
  </thead>
  <tbody>
    {% for s in summaries %}
    <tr>
      <td class="col-id"><small>{{ s.id }}</small></td>
      <td class="col-name"><a href="/groups/{{ s.id }}">{{ s.name }}</a></td>
      <td class="col-num">{{ s.message_count }}</td>
      <td class="col-num">{{ s.total_size | filesizeformat }}</td>
      <td class="col-date">{{ s.latest_message_date | human_date }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
