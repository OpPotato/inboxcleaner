<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}inboxcleaner{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    :root {
      --pico-font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      --pico-font-size: 15px;
    }

    body > nav {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--pico-muted-border-color);
    }

    main {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    /* ---- Hero (index page) ---- */
    .hero {
      margin-bottom: 2rem;
    }
    .hero h1 {
      margin-bottom: 0.25rem;
    }
    .tagline {
      color: var(--pico-muted-color);
      font-size: 1.1rem;
      margin: 0;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem;
      margin: 2rem 0;
    }
    .card {
      margin: 0;
      padding: 1.25rem;
      background: var(--pico-card-background-color);
      border: 1px solid var(--pico-card-border-color);
      border-radius: var(--pico-border-radius);
    }
    .card h3 {
      margin: 0 0 0.5rem 0;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--pico-muted-color);
    }
    .card-value {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 600;
      line-height: 1.2;
      word-break: break-word;
    }
    .card-sub {
      margin: 0.25rem 0 0;
      color: var(--pico-muted-color);
      font-size: 0.9rem;
    }
    .cta {
      margin: 2rem 0 0;
    }
    .cta [role="button"] {
      display: inline-block;
    }
    .empty-state {
      padding: 2rem;
      text-align: center;
    }
    .empty-state pre {
      text-align: left;
      max-width: 400px;
      margin: 1rem auto;
    }
    .footnote {
      margin-top: 3rem;
      color: var(--pico-muted-color);
    }

    /* ---- Groups list ---- */
    .toolbar {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .toolbar select { margin: 0; min-width: 160px; }

    table {
      font-size: 0.92rem;
    }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable a {
      color: inherit;
      text-decoration: none;
    }
    th.sortable a:hover {
      text-decoration: underline;
    }
    tbody tr:hover {
      background: var(--pico-secondary-background);
    }
    .col-id { width: 4ch; color: var(--pico-muted-color); }
    .col-num { text-align: right; width: 10ch; white-space: nowrap; }
    .col-date { width: 12ch; white-space: nowrap; color: var(--pico-muted-color); }
    .col-name a {
      font-weight: 500;
    }

    /* ---- Group detail ---- */
    .breadcrumb {
      margin-bottom: 0.5rem;
    }
    .breadcrumb a {
      color: var(--pico-muted-color);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .breadcrumb a:hover {
      color: var(--pico-primary);
    }
    .group-header h1 {
      margin: 0;
    }
    .group-meta {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin: 0.5rem 0 1.5rem;
      color: var(--pico-muted-color);
      font-size: 0.95rem;
    }
    .group-id {
      font-family: var(--pico-font-family-monospace, monospace);
      font-size: 0.85rem;
    }
    .action-toolbar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      padding: 1rem;
      background: var(--pico-card-background-color);
      border: 1px solid var(--pico-card-border-color);
      border-radius: var(--pico-border-radius);
    }
    .action-toolbar button {
      margin: 0;
    }
    button.danger {
      --pico-background-color: var(--pico-color-red-500);
      --pico-border-color: var(--pico-color-red-500);
      --pico-color: white;
    }
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
    }
    @media (max-width: 800px) {
      .two-col { grid-template-columns: 1fr; }
    }
    .two-col h2 {
      font-size: 1.15rem;
      margin-bottom: 0.75rem;
    }
    .senders-table .email {
      font-family: var(--pico-font-family-monospace, monospace);
      font-size: 0.85rem;
    }
    .recent-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .recent-list li {
      display: flex;
      gap: 0.75rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--pico-muted-border-color);
      align-items: baseline;
    }
    .recent-list li:last-child {
      border-bottom: none;
    }
    .recent-list time {
      color: var(--pico-muted-color);
      font-size: 0.85rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .recent-list .subject {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .empty {
      color: var(--pico-muted-color);
      font-style: italic;
    }

    /* ---- Modal ---- */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fade-in 0.12s ease-out;
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .modal {
      background: var(--pico-background-color);
      padding: 1.75rem;
      border-radius: var(--pico-border-radius);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      max-width: 580px;
      width: calc(100% - 2rem);
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal h3 {
      margin: 0 0 1rem 0;
    }
    .modal ul {
      max-height: 200px;
      overflow-y: auto;
      padding-left: 1.25rem;
    }
    .modal ul li {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0.15rem 0;
    }
    .modal .action-buttons {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }
    .modal label {
      display: block;
      margin: 1rem 0;
    }
  </style>
</head>
<body>
  <nav>
    <ul><li><strong><a href="/">inboxcleaner</a></strong></li></ul>
    <ul>
      <li><a href="/groups">Groups</a></li>
    </ul>
  </nav>
  <main>{% block content %}{% endblock %}</main>
  <div id="modal"></div>
</body>
</html>
