<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}inboxcleaner{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    main { max-width: 1100px; margin: 1rem auto; padding: 0 1rem; }
    .toolbar { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
    table { font-size: 0.95rem; }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { text-decoration: underline; }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5);
      display: flex; align-items: center; justify-content: center; z-index: 100;
    }
    .modal {
      background: var(--pico-background-color); padding: 1.5rem; border-radius: 8px;
      max-width: 600px; max-height: 80vh; overflow-y: auto;
    }
    .action-buttons { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  </style>
</head>
<body>
  <nav>
    <ul><li><strong><a href="/">inboxcleaner</a></strong></li></ul>
    <ul>
      <li><a href="/groups">Groups</a></li>
    </ul>
  </nav>
  <main>{% block content %}{% endblock %}</main>
  <div id="modal"></div>
</body>
</html>
