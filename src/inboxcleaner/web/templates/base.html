<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}inboxcleaner{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>

  <style>
    :root {
      /* Palette: warm parchment + ink, ochre accent, deep red for destruction. */
      --ink:        #1A1814;
      --paper:      #FAF7F0;
      --paper-2:    #F2EEE2;
      --rule:       #1A1814;
      --muted:      #6F6A60;
      --muted-2:    #B8B0A0;
      --accent:     #C2691F;   /* ochre */
      --accent-ink: #FAF7F0;
      --danger:     #9B2C2C;   /* deep red */
      --danger-ink: #FAF7F0;
      --hover-bg:   #ECE6D5;

      /* Type */
      --display: "Newsreader", "Iowan Old Style", Georgia, serif;
      --sans:    "IBM Plex Sans", -apple-system, BlinkMacSystemFont, sans-serif;
      --mono:    "IBM Plex Mono", "Menlo", "Consolas", monospace;
    }

    * { box-sizing: border-box; }

    html, body { background: var(--paper); color: var(--ink); }

    body {
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.5;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-image: radial-gradient(circle, rgba(26, 24, 20, 0.04) 1px, transparent 1px);
      background-size: 22px 22px;
      background-position: 0 0;
    }

    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px dotted currentColor;
    }
    a:hover { color: var(--accent); }

    /* ===== Top bar ===== */
    .topbar {
      border-bottom: 1px solid var(--rule);
      background: var(--paper);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .topbar-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 2rem;
    }
    .brand {
      font-family: var(--display);
      font-size: 1.75rem;
      font-style: italic;
      letter-spacing: -0.01em;
      line-height: 1;
      border-bottom: none;
    }
    .brand:hover { color: var(--ink); }
    .brand .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 0.25rem 0 0;
      vertical-align: 2px;
    }
    .topnav {
      display: flex;
      gap: 1.5rem;
      font-family: var(--mono);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .topnav a { border-bottom: none; color: var(--muted); }
    .topnav a:hover { color: var(--ink); }
    .topnav a.active {
      color: var(--ink);
      border-bottom: 1px solid var(--accent);
      padding-bottom: 2px;
    }

    /* ===== Main ===== */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
    }

    h1, h2, h3 { font-family: var(--display); font-weight: 500; letter-spacing: -0.015em; }
    h1 { font-size: 2.75rem; line-height: 1.05; margin: 0 0 0.5rem; }
    h2 { font-size: 1.5rem; line-height: 1.2; margin: 2rem 0 1rem; }
    h3 { font-size: 1rem; margin: 0 0 0.5rem; }

    .mono, code, kbd, pre { font-family: var(--mono); }
    pre {
      background: var(--paper-2);
      padding: 1rem;
      font-size: 0.85rem;
      border-left: 2px solid var(--accent);
      overflow-x: auto;
    }
    code { font-size: 0.92em; }

    /* ===== Hero (index) ===== */
    .hero {
      padding-bottom: 2.5rem;
      border-bottom: 1px dashed var(--muted-2);
      margin-bottom: 2.5rem;
    }
    .hero h1 .accent-em {
      font-style: italic;
      color: var(--accent);
    }
    .tagline {
      font-family: var(--display);
      font-style: italic;
      font-size: 1.15rem;
      color: var(--muted);
      margin: 0.5rem 0 0;
      max-width: 36rem;
    }

    /* ===== Cards ===== */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 0;
      border-top: 1px solid var(--rule);
      border-left: 1px solid var(--rule);
    }
    .card {
      border-right: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      padding: 1.25rem 1.5rem;
      background: var(--paper);
    }
    .card h3 {
      font-family: var(--mono);
      font-weight: 400;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }
    .card-value {
      font-family: var(--display);
      font-size: 1.6rem;
      line-height: 1.1;
      margin: 0;
      letter-spacing: -0.01em;
      word-break: break-word;
    }
    .card-sub {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
      margin: 0.4rem 0 0;
    }

    .cta { margin: 2.5rem 0 0; }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      border: 1px dashed var(--muted-2);
    }
    .empty-state pre { display: inline-block; text-align: left; margin: 1rem auto; }

    .footnote {
      margin-top: 5rem;
      padding-top: 2rem;
      border-top: 1px dashed var(--muted-2);
      color: var(--muted);
    }
    .footnote small { font-family: var(--mono); font-size: 0.78rem; }

    /* ===== Toolbar ===== */
    .toolbar {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
      padding: 0.75rem 1rem;
      background: var(--paper-2);
      border: 1px solid var(--rule);
    }
    .toolbar label {
      font-family: var(--mono);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    select {
      font-family: var(--mono);
      font-size: 0.9rem;
      background: var(--paper);
      border: 1px solid var(--rule);
      padding: 0.4rem 0.6rem;
      color: var(--ink);
    }
    select:focus {
      outline: 2px solid var(--accent);
      outline-offset: -1px;
    }

    /* ===== Tables ===== */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
    }
    thead th {
      font-family: var(--mono);
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.72rem;
      color: var(--muted);
      text-align: left;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--rule);
      white-space: nowrap;
    }
    tbody td {
      padding: 0.6rem 0.75rem;
      border-bottom: 1px dotted var(--muted-2);
      vertical-align: baseline;
    }
    tbody tr {
      transition: background 80ms ease-out;
    }
    tbody tr:hover { background: var(--hover-bg); }
    th.sortable a {
      border-bottom: none;
      color: inherit;
    }
    th.sortable a:hover { color: var(--accent); }
    .col-id {
      width: 4ch;
      font-family: var(--mono);
      color: var(--muted);
      font-size: 0.8rem;
    }
    .col-num {
      text-align: right;
      width: 10ch;
      white-space: nowrap;
      font-family: var(--mono);
      font-variant-numeric: tabular-nums;
    }
    .col-date {
      width: 12ch;
      white-space: nowrap;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--muted);
    }
    .col-name a {
      font-weight: 500;
      border-bottom: none;
    }
    .col-name a:hover {
      border-bottom: 1px solid var(--accent);
    }

    /* ===== Group detail ===== */
    .breadcrumb {
      margin-bottom: 1.5rem;
      font-family: var(--mono);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .breadcrumb a {
      color: var(--muted);
      border-bottom: none;
    }
    .breadcrumb a:hover { color: var(--accent); }

    .group-header h1 { margin-bottom: 0.25rem; }
    .group-meta {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin: 0.25rem 0 2rem;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--muted);
    }
    .group-meta strong {
      color: var(--ink);
      font-family: var(--display);
      font-style: italic;
      font-weight: 500;
      font-size: 1rem;
      margin-right: 0.15rem;
    }
    .group-id {
      color: var(--muted-2);
      letter-spacing: 0.05em;
    }

    .action-toolbar {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin: 0 0 3rem;
      padding: 0;
    }
    .action-toolbar::before {
      content: "";
      display: block;
      flex-basis: 100%;
      height: 0;
    }

    /* ===== Buttons ===== */
    button, .btn, [role="button"] {
      font-family: var(--mono);
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.55rem 1.1rem;
      background: var(--paper);
      color: var(--ink);
      border: 1px solid var(--rule);
      cursor: pointer;
      transition: all 90ms ease-out;
    }
    button:hover, [role="button"]:hover {
      background: var(--ink);
      color: var(--paper);
    }
    button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    button.danger {
      background: var(--danger);
      color: var(--danger-ink);
      border-color: var(--danger);
    }
    button.danger:hover {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }
    button.secondary {
      background: transparent;
      border-color: var(--muted-2);
      color: var(--muted);
    }
    button.secondary:hover {
      background: transparent;
      color: var(--ink);
      border-color: var(--ink);
    }

    [role="button"] {
      display: inline-block;
      text-decoration: none;
      border-bottom: 1px solid var(--rule);  /* override <a> default dotted */
    }

    /* ===== Two-column (group detail) ===== */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
    }
    @media (max-width: 800px) {
      .two-col { grid-template-columns: 1fr; gap: 2rem; }
    }
    .two-col h2 small {
      font-family: var(--mono);
      font-style: normal;
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-left: 0.5rem;
    }
    .senders-table .email {
      font-family: var(--mono);
      font-size: 0.83rem;
    }
    .recent-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .recent-list li {
      display: flex;
      gap: 1rem;
      padding: 0.6rem 0;
      border-bottom: 1px dotted var(--muted-2);
      align-items: baseline;
    }
    .recent-list li:last-child { border-bottom: none; }
    .recent-list time {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }
    .recent-list .subject {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .empty {
      color: var(--muted);
      font-style: italic;
      font-family: var(--display);
    }

    /* ===== Modal ===== */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(26, 24, 20, 0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fade-in 0.16s ease-out;
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slide-up {
      from { transform: translateY(8px); opacity: 0.6; }
      to   { transform: translateY(0);   opacity: 1; }
    }
    .modal {
      background: var(--paper);
      padding: 2rem 2.25rem;
      border: 1px solid var(--rule);
      box-shadow: 12px 12px 0 var(--ink);
      max-width: 580px;
      width: calc(100% - 2rem);
      max-height: 80vh;
      overflow-y: auto;
      animation: slide-up 0.18s ease-out;
    }
    .modal h3 {
      font-family: var(--display);
      font-size: 1.5rem;
      font-style: italic;
      letter-spacing: -0.01em;
      margin: 0 0 0.75rem;
      text-transform: none;
      font-weight: 500;
    }
    .modal p {
      margin: 0 0 1rem;
    }
    .modal p strong {
      font-family: var(--display);
      font-weight: 500;
      font-size: 1.1rem;
    }
    .modal small {
      font-family: var(--mono);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .modal ul {
      list-style: none;
      padding: 0;
      margin: 0.5rem 0 1.25rem;
      max-height: 220px;
      overflow-y: auto;
      border-top: 1px dotted var(--muted-2);
      border-bottom: 1px dotted var(--muted-2);
    }
    .modal ul li {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding: 0.3rem 0;
      border-bottom: 1px dotted var(--muted-2);
      font-size: 0.9rem;
    }
    .modal ul li:last-child { border-bottom: none; }
    .modal label {
      display: block;
      margin: 1.25rem 0;
      font-family: var(--mono);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .modal input[type="text"], .modal input:not([type]) {
      display: block;
      width: 100%;
      margin-top: 0.4rem;
      padding: 0.55rem 0.7rem;
      font-family: var(--mono);
      font-size: 0.95rem;
      text-transform: none;
      letter-spacing: 0;
      background: var(--paper);
      color: var(--ink);
      border: 1px solid var(--rule);
    }
    .modal input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
    .modal .action-buttons {
      display: flex;
      gap: 0.5rem;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    /* ===== HTMX loading state ===== */
    .htmx-request { opacity: 0.6; transition: opacity 0.15s ease-in; }

    /* ===== Selection ===== */
    ::selection { background: var(--accent); color: var(--accent-ink); }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a href="/" class="brand"><span class="dot"></span>inboxcleaner</a>
      <nav class="topnav">
        <a href="/groups">Groups</a>
      </nav>
    </div>
  </header>

  <main>{% block content %}{% endblock %}</main>
  <div id="modal"></div>
</body>
</html>
