<div class="modal-overlay" hx-on:click="if (event.target === this) this.remove()">
  <div class="modal">
    <h3>✓ Done</h3>
    <p>{{ summary }}</p>
    {% if result_urls %}
      <p><small>Open these unsubscribe URLs in your browser:</small></p>
      <ul>
        {% for u in result_urls %}<li><a href="{{ u }}" target="_blank" rel="noopener">{{ u }}</a></li>{% endfor %}
      </ul>
    {% endif %}
    <div class="action-buttons">
      <button type="button" onclick="document.querySelector('.modal-overlay').remove(); location.reload();">Close</button>
    </div>
  </div>
</div>
